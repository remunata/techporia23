services:
  app:
    build:
      context: .
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html

  db:
    image: mysql:lts
    restart: unless-stopped
    ports:
      - "8081:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: techporia
      MYSQL_USER: techporia
      MYSQL_PASSWORD: techporia_pass
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
